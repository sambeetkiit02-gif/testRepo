<template>
    <div class="toolbar slds-p-around_small slds-grid slds-grid_vertical-align-center slds-grid_align-spread">
        <div class="slds-text-title_caps">Recent Accounts</div>
        <lightning-button-icon
            icon-name={toggleIcon}
            alternative-text="Toggle compact view"
            title="Toggle compact view"
            onclick={handleToggle}
        ></lightning-button-icon>
    </div>

    <!-- Detailed view -->
    <template if:false={compact}>        
        <lightning-card class="slds-m-around_small">
            <div class="slds-p-horizontal_small">
                <table class="slds-table slds-table_cell-buffer slds-table_bordered">
                    <thead>
                        <tr class="slds-line-height_reset">
                            <th scope="col"><div class="slds-truncate" title="Name">Name</div></th>
                            <th scope="col"><div class="slds-truncate" title="Type">Type</div></th>
                            <th scope="col"><div class="slds-truncate" title="Industry">Industry</div></th>
                            <th scope="col"><div class="slds-truncate" title="Phone">Phone</div></th>
                        </tr>
                    </thead>
                    <tbody>
                        <template for:each={accounts} for:item="acc">
                            <tr key={acc.Id}>
                                <td><div class="slds-truncate" title={acc.Name}>{acc.Name}</div></td>
                                <td><div class="slds-truncate" title={acc.Type}>{acc.Type}</div></td>
                                <td><div class="slds-truncate" title={acc.Industry}>{acc.Industry}</div></td>
                                <td><div class="slds-truncate" title={acc.Phone}>{acc.Phone}</div></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </lightning-card>
    </template>

    <!-- Compact view: only names -->
    <template if:true={compact}>
        <lightning-card class="slds-m-around_small">
            <ul class="compact-list slds-p-vertical_x-small slds-p-horizontal_small">
                <template for:each={accounts} for:item="acc">
                    <li key={acc.Id} class="compact-row slds-p-vertical_xx-small">
                        <span class="slds-truncate" title={acc.Name}>{acc.Name}</span>
                    </li>
                </template>
            </ul>
        </lightning-card>
    </template>
</template>
